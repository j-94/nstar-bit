    "12.7_graph_schema_lineage":
      label: "Graph Schema Lineage (Evolution of the State Format)"
      status: LIVE
      evidence: "Cross-referenced across all 7 graph types above"
      last_audited: "2026-03-09"
      notes: |
        The graph schema evolved through 4 generations:

        GEN 1 — nstar-autogenesis/ era (hypotheses, active_core, seed_queue)
          Fields: version, created_at, turn, events, hypotheses, active_core
          Files: good_enough_state.json, first_loop_state.json

        GEN 2 — autogenesis_graph era (concepts, relations, aliases, evidence_log)
          Fields: concepts{}, relations{}, aliases{}, support_set on each relation
          Files: epoch1-73_fork.json, corpus_agent_state.json
          Key: no_evidence_at_declaration gate; support_set; confidence=0 at entry

        GEN 3 — canonical_state era (graph.nodes, graph.edges, receipts, criteria)
          Fields: GraphNode{id,prime_id,activation,threshold}, GraphEdge{c11,c10,c01,c00}
          Files: baseline_state.json, lm_state.json, nstar_canonical_state.json
          Key: evalexpr OVM; SHA256 receipt chain; typed edges (Hypothesis/Supports/Inhibits)

        GEN 4 — canonical_state + corpus (massive hypothesis substrate)
          Files: nstar_canonical_state.json (27,534 edges after 58 turns)
          Key: LM-evolved scoring rule with log(t+1) recency weighting

        THE GAP: GEN 2 has support_set + conformal grounding. GEN 3 has receipt chain +
        evalexpr OVM. Neither has both. The unification is the primary build target.
